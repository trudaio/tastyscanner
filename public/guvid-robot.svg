<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <!-- Robot metallic gradient -->
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a6e5c"/>
      <stop offset="40%" stop-color="#4d8a6a"/>
      <stop offset="100%" stop-color="#2a5040"/>
    </linearGradient>
    <!-- Eye glow -->
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4af0ff"/>
      <stop offset="60%" stop-color="#4a9eff"/>
      <stop offset="100%" stop-color="#2060aa"/>
    </radialGradient>
    <!-- Antenna glow -->
    <radialGradient id="antennaGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff4d6d"/>
      <stop offset="100%" stop-color="#cc2244"/>
    </radialGradient>
    <!-- Body panel lines -->
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.15)"/>
    </linearGradient>
    <!-- Fin gradient -->
    <linearGradient id="finGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a5848"/>
      <stop offset="100%" stop-color="#1a3830"/>
    </linearGradient>
    <!-- Jaw gradient -->
    <linearGradient id="jawGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334"/>
      <stop offset="100%" stop-color="#222"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="#0d0d1a"/>
  <circle cx="100" cy="100" r="93" fill="none" stroke="#4a9eff" stroke-width="1.5" opacity="0.3"/>

  <!-- Antenna -->
  <line x1="88" y1="52" x2="78" y2="30" stroke="#667" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="78" cy="28" r="5" fill="url(#antennaGlow)"/>
  <circle cx="78" cy="28" r="3" fill="#ff6080" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Tail fin -->
  <path d="M148 95 L175 72 L170 98 L175 124 Z" fill="url(#finGrad)" stroke="#1a3830" stroke-width="1"/>
  <!-- Tail fin panel lines -->
  <line x1="152" y1="85" x2="168" y2="76" stroke="rgba(74,158,255,0.2)" stroke-width="0.5"/>
  <line x1="152" y1="98" x2="170" y2="98" stroke="rgba(74,158,255,0.2)" stroke-width="0.5"/>
  <line x1="152" y1="110" x2="168" y2="118" stroke="rgba(74,158,255,0.2)" stroke-width="0.5"/>

  <!-- Top fin -->
  <path d="M80 62 L95 42 L110 48 L115 62" fill="url(#finGrad)" stroke="#1a3830" stroke-width="1"/>
  <line x1="90" y1="50" x2="95" y2="62" stroke="rgba(74,158,255,0.25)" stroke-width="0.5"/>
  <line x1="100" y1="48" x2="105" y2="60" stroke="rgba(74,158,255,0.25)" stroke-width="0.5"/>

  <!-- Bottom fin -->
  <path d="M85 132 L95 150 L110 148 L108 132" fill="url(#finGrad)" stroke="#1a3830" stroke-width="1"/>

  <!-- Side fin (pectoral) -->
  <path d="M70 105 L48 115 L50 98 L65 95" fill="url(#finGrad)" stroke="#1a3830" stroke-width="1" opacity="0.85"/>

  <!-- Main fish body (robot plating) -->
  <ellipse cx="105" cy="97" rx="55" ry="38" fill="url(#bodyGrad)" stroke="#1a3830" stroke-width="1.5"/>

  <!-- Body armor panels -->
  <path d="M65 80 L145 80" stroke="rgba(74,158,255,0.15)" stroke-width="0.7" fill="none"/>
  <path d="M60 92 L150 92" stroke="rgba(74,158,255,0.12)" stroke-width="0.7" fill="none"/>
  <path d="M60 104 L150 104" stroke="rgba(74,158,255,0.12)" stroke-width="0.7" fill="none"/>
  <path d="M65 116 L145 116" stroke="rgba(74,158,255,0.15)" stroke-width="0.7" fill="none"/>

  <!-- Body rivets -->
  <circle cx="72" cy="80" r="1.5" fill="#556" opacity="0.5"/>
  <circle cx="138" cy="80" r="1.5" fill="#556" opacity="0.5"/>
  <circle cx="72" cy="116" r="1.5" fill="#556" opacity="0.5"/>
  <circle cx="138" cy="116" r="1.5" fill="#556" opacity="0.5"/>
  <circle cx="130" cy="92" r="1.2" fill="#556" opacity="0.4"/>
  <circle cx="130" cy="104" r="1.2" fill="#556" opacity="0.4"/>

  <!-- Metallic sheen -->
  <ellipse cx="95" cy="82" rx="30" ry="10" fill="rgba(255,255,255,0.06)"/>

  <!-- Robot face plate -->
  <rect x="62" y="76" rx="8" ry="8" width="50" height="40" fill="#1a2a35" stroke="#4a9eff" stroke-width="1" opacity="0.6"/>

  <!-- Robot eye (left/main) - glowing LED -->
  <circle cx="78" cy="90" r="10" fill="#112" stroke="#4a9eff" stroke-width="1.2"/>
  <circle cx="78" cy="90" r="7" fill="url(#eyeGlow)"/>
  <circle cx="78" cy="90" r="4" fill="#fff" opacity="0.4"/>
  <circle cx="76" cy="88" r="2" fill="#fff" opacity="0.7"/>
  <!-- Eye glow effect -->
  <circle cx="78" cy="90" r="11" fill="none" stroke="#4af0ff" stroke-width="0.5" opacity="0.4">
    <animate attributeName="r" values="11;13;11" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Robot eye (right/smaller) -->
  <circle cx="100" cy="92" r="7" fill="#112" stroke="#4a9eff" stroke-width="1"/>
  <circle cx="100" cy="92" r="5" fill="url(#eyeGlow)"/>
  <circle cx="100" cy="92" r="2.5" fill="#fff" opacity="0.4"/>
  <circle cx="99" cy="91" r="1.3" fill="#fff" opacity="0.7"/>

  <!-- Robot mouth / jaw -->
  <rect x="68" y="104" rx="3" ry="3" width="36" height="8" fill="url(#jawGrad)" stroke="#4a9eff" stroke-width="0.7"/>
  <!-- Mouth grid lines (speaker/vent) -->
  <line x1="75" y1="105" x2="75" y2="111" stroke="#4a9eff" stroke-width="0.5" opacity="0.5"/>
  <line x1="80" y1="105" x2="80" y2="111" stroke="#4a9eff" stroke-width="0.5" opacity="0.5"/>
  <line x1="85" y1="105" x2="85" y2="111" stroke="#4a9eff" stroke-width="0.5" opacity="0.5"/>
  <line x1="90" y1="105" x2="90" y2="111" stroke="#4a9eff" stroke-width="0.5" opacity="0.5"/>
  <line x1="95" y1="105" x2="95" y2="111" stroke="#4a9eff" stroke-width="0.5" opacity="0.5"/>
  <line x1="100" y1="105" x2="100" y2="111" stroke="#4a9eff" stroke-width="0.5" opacity="0.5"/>

  <!-- Robot teeth (sharp, like piranha) -->
  <path d="M68 104 L72 108 L76 104 L80 108 L84 104 L88 108 L92 104 L96 108 L100 104 L104 108"
        fill="none" stroke="#aac" stroke-width="1" opacity="0.6"/>

  <!-- Small circuit/data indicators on body -->
  <rect x="120" y="86" rx="2" ry="2" width="16" height="4" fill="#0a1a12" stroke="#4dff91" stroke-width="0.5" opacity="0.6"/>
  <rect x="121" y="87" rx="1" ry="1" width="6" height="2" fill="#4dff91" opacity="0.5">
    <animate attributeName="width" values="6;10;3;8;6" dur="3s" repeatCount="indefinite"/>
  </rect>

  <rect x="120" y="94" rx="2" ry="2" width="16" height="4" fill="#0a1a12" stroke="#ffaa00" stroke-width="0.5" opacity="0.6"/>
  <rect x="121" y="95" rx="1" ry="1" width="10" height="2" fill="#ffaa00" opacity="0.5">
    <animate attributeName="width" values="10;4;12;7;10" dur="2.5s" repeatCount="indefinite"/>
  </rect>

  <!-- Scales pattern (subtle, robotic) -->
  <g opacity="0.08">
    <circle cx="115" cy="78" r="5" fill="none" stroke="#fff" stroke-width="0.5"/>
    <circle cx="125" cy="82" r="5" fill="none" stroke="#fff" stroke-width="0.5"/>
    <circle cx="135" cy="86" r="5" fill="none" stroke="#fff" stroke-width="0.5"/>
    <circle cx="115" cy="88" r="5" fill="none" stroke="#fff" stroke-width="0.5"/>
    <circle cx="125" cy="92" r="5" fill="none" stroke="#fff" stroke-width="0.5"/>
    <circle cx="135" cy="96" r="5" fill="none" stroke="#fff" stroke-width="0.5"/>
    <circle cx="115" cy="98" r="5" fill="none" stroke="#fff" stroke-width="0.5"/>
    <circle cx="125" cy="102" r="5" fill="none" stroke="#fff" stroke-width="0.5"/>
    <circle cx="135" cy="106" r="5" fill="none" stroke="#fff" stroke-width="0.5"/>
    <circle cx="115" cy="108" r="5" fill="none" stroke="#fff" stroke-width="0.5"/>
    <circle cx="125" cy="112" r="5" fill="none" stroke="#fff" stroke-width="0.5"/>
  </g>
</svg>
