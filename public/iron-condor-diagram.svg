<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <!-- Background -->
  <rect width="800" height="500" rx="16" fill="#f7f9fc" stroke="#e4e8ef" stroke-width="1.5"/>

  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a2e">Iron Condor — Profit &amp; Loss la Expirare</text>

  <!-- Grid -->
  <line x1="100" y1="100" x2="100" y2="400" stroke="#dde3eb" stroke-width="1"/>
  <line x1="700" y1="100" x2="700" y2="400" stroke="#dde3eb" stroke-width="1"/>
  <!-- Horizontal zero line -->
  <line x1="80" y1="270" x2="720" y2="270" stroke="#b0b8c4" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="75" y="274" text-anchor="end" font-size="13" fill="#888" font-weight="600">$0</text>

  <!-- Max profit line -->
  <line x1="300" y1="200" x2="500" y2="200" stroke="#1a73e8" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.5"/>
  <text x="75" y="204" text-anchor="end" font-size="12" fill="#1a73e8" font-weight="600">+Credit</text>

  <!-- Max loss line -->
  <line x1="100" y1="380" x2="200" y2="380" stroke="#e53935" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.5"/>
  <line x1="600" y1="380" x2="700" y2="380" stroke="#e53935" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.5"/>
  <text x="75" y="384" text-anchor="end" font-size="12" fill="#e53935" font-weight="600">-Max Loss</text>

  <!-- Shaded profit zone -->
  <rect x="300" y="200" width="200" height="70" fill="#1a73e8" opacity="0.07" rx="4"/>

  <!-- P&L Payoff line (the iron condor shape) -->
  <polyline
    points="100,380 200,380 300,200 500,200 600,380 700,380"
    fill="none"
    stroke="#1a73e8"
    stroke-width="3.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Strike labels -->
  <!-- Long Put -->
  <line x1="200" y1="380" x2="200" y2="420" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="200" y="440" text-anchor="middle" font-size="12" fill="#666" font-weight="600">Long Put</text>
  <text x="200" y="456" text-anchor="middle" font-size="11" fill="#999">Strike A</text>

  <!-- Short Put -->
  <line x1="300" y1="200" x2="300" y2="420" stroke="#1a73e8" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="300" y="440" text-anchor="middle" font-size="12" fill="#1a73e8" font-weight="600">Short Put</text>
  <text x="300" y="456" text-anchor="middle" font-size="11" fill="#999">Strike B</text>

  <!-- Short Call -->
  <line x1="500" y1="200" x2="500" y2="420" stroke="#1a73e8" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="500" y="440" text-anchor="middle" font-size="12" fill="#1a73e8" font-weight="600">Short Call</text>
  <text x="500" y="456" text-anchor="middle" font-size="11" fill="#999">Strike C</text>

  <!-- Long Call -->
  <line x1="600" y1="380" x2="600" y2="420" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="600" y="440" text-anchor="middle" font-size="12" fill="#666" font-weight="600">Long Call</text>
  <text x="600" y="456" text-anchor="middle" font-size="11" fill="#999">Strike D</text>

  <!-- Profit zone label -->
  <text x="400" y="185" text-anchor="middle" font-size="14" font-weight="700" fill="#1a73e8">ZONA DE PROFIT</text>

  <!-- Breakeven points -->
  <circle cx="240" cy="270" r="5" fill="#ff9800"/>
  <text x="240" y="260" text-anchor="middle" font-size="11" fill="#ff9800" font-weight="600">BE</text>
  <circle cx="560" cy="270" r="5" fill="#ff9800"/>
  <text x="560" y="260" text-anchor="middle" font-size="11" fill="#ff9800" font-weight="600">BE</text>

  <!-- Price axis label -->
  <text x="400" y="488" text-anchor="middle" font-size="13" fill="#888">Pretul activului suport la expirare →</text>

  <!-- Corner dots for decoration -->
  <circle cx="130" cy="80" r="3" fill="#1a73e8" opacity="0.3"/>
  <circle cx="145" cy="80" r="3" fill="#1a73e8" opacity="0.2"/>
  <circle cx="160" cy="80" r="3" fill="#1a73e8" opacity="0.1"/>
</svg>